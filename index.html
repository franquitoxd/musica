<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acordes Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --fondo-app: #121212;
            --fondo-tarjeta: #1e1e1e;
            --fondo-input: #2d2d2d;
            --texto-principal: #ffffff;
            --texto-secundario: #a0a0a0;
            --color-acorde: #00e676;
            --color-primario: #2979ff;
            --color-peligro: #ff5252;
            --color-alerta: #ffb300;
            --borde: #333333;
            /* Variable dinamica para el zoom */
            --factor-zoom: 1;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--fondo-app);
            color: var(--texto-principal);
            margin: 0;
            padding: 0;
            padding-bottom: 140px; 
        }

        #cabecera-app {
            background-color: var(--fondo-tarjeta);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--borde);
            position: sticky;
            top: 0;
            z-index: 90;
        }

        #btn-hamburguesa { background: none; border: none; color: var(--texto-principal); font-size: 28px; padding: 0 15px 0 0; cursor: pointer; }
        .btn-casita { background: none; border: none; font-size: 24px; cursor: pointer; margin-right: 15px; padding: 0; }
        #titulo-cabecera { font-size: 20px; font-weight: bold; color: var(--texto-principal); }

        #menu-lateral {
            position: fixed; top: 0; left: -100%; width: 100%; height: 100%;
            background-color: var(--fondo-app); z-index: 2000; transition: left 0.3s ease;
            padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center;
        }
        #menu-lateral.abierto { left: 0; }
        #menu-lateral .nav-btn { font-size: 20px; padding: 20px; margin-bottom: 15px; width: 90%; background-color: var(--fondo-tarjeta); border: 1px solid var(--borde); border-radius: 10px; color: var(--texto-principal); text-align: center; }
        #menu-lateral .nav-btn.activa { background-color: var(--color-primario); color: white; border-color: var(--color-primario); }
        .btn-cerrar-menu { width: auto; align-self: flex-end; background: none; color: var(--color-peligro); font-size: 18px; padding: 10px; margin-bottom: 30px; }

        .contenedor { max-width: 700px; margin: 15px auto; padding: 0 15px; }
        .seccion { display: none; animation: fadeIn 0.3s ease; }
        .seccion.activa { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h1, h2, h3 { color: var(--texto-principal); margin-top: 0; }
        
        button { border: none; border-radius: 8px; padding: 12px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; background-color: var(--fondo-input); color: var(--texto-principal); }
        .btn-accion { background-color: var(--color-primario); color: white; }
        .btn-guardar { background-color: var(--color-acorde); color: #000; }
        .btn-peligro { background-color: transparent; border: 1px solid var(--color-peligro); color: var(--color-peligro); }
        .btn-chico { width: auto; padding: 6px 10px; font-size: 13px; margin: 2px; }
        .btn-mover { background-color: var(--fondo-app); padding: 10px; font-size: 18px; width: auto; margin: 0;}
        .btn-mover-setlist { background: none; border: none; font-size: 20px; padding: 0; margin: 0 5px; cursor: pointer;}

        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--borde); border-radius: 8px; font-size: 16px; box-sizing: border-box; background-color: var(--fondo-input); color: var(--texto-principal); margin-bottom: 15px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--color-primario); }

        .contenedor-etiquetas { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
        .etiqueta { background-color: var(--fondo-input); padding: 5px 10px; border-radius: 15px; font-size: 12px; border: 1px solid var(--borde); cursor: pointer; }
        .etiqueta.seleccionada { background-color: var(--color-primario); color: white; border-color: var(--color-primario); }
        .etiqueta-mostrar { background-color: var(--borde); color: var(--texto-secundario); padding: 3px 8px; border-radius: 10px; font-size: 10px; margin-right: 5px;}

        .tarjeta-cancion { background-color: var(--fondo-tarjeta); border: 1px solid var(--borde); padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .tarjeta-cancion h3 { margin: 0 0 5px 0; }
        .botones-lista { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        
        .caja-parte { background-color: var(--fondo-tarjeta); padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--color-primario); transition: transform 0.2s;}
        .cabecera-parte { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .fila-armar { display: flex; gap: 5px; align-items: center; margin-bottom: 10px; background-color: var(--fondo-tarjeta); padding: 5px; border-radius: 8px;}
        .fila-armar input { margin-bottom: 0; flex-grow: 1; }
        .controles-mover-setlist { display: flex; flex-direction: column; }

        .fullscreen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--fondo-app); z-index: 1000; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .visor-header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--borde); padding-bottom: 10px; }
        .visor-header h1 { color: var(--color-primario); font-size: 32px; margin-bottom: 5px; }
        
        /* Contenedor centralizado para pantallas gigantes */
        #visor-contenido { max-width: 800px; margin: 0 auto; width: 100%; }
        
        .visor-bloque { margin-bottom: 25px; }
        .visor-tipo { font-size: 14px; color: var(--texto-secundario); text-transform: uppercase; margin-bottom: 5px; }
        
        /* Textos fluidos e inteligentes */
        .visor-acordes { 
            font-family: monospace; 
            font-size: calc(clamp(20px, 5vw, 34px) * var(--factor-zoom)); 
            color: var(--color-acorde); 
            font-weight: bold; 
            margin-bottom: 5px; 
        }
        .visor-letra { 
            font-size: calc(clamp(16px, 4vw, 26px) * var(--factor-zoom)); 
            line-height: 1.5; 
            white-space: pre-wrap; 
        }
        
        .barra-herramientas {
            position: fixed; bottom: 0; left: 0; right: 0; background-color: var(--fondo-tarjeta);
            padding: 10px; display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--borde); z-index: 1010; flex-wrap: wrap; gap: 5px;
        }
        .herramienta-grupo { display: flex; gap: 5px; align-items: center; margin-bottom: 5px; }

        .aguja-afinador { width: 10px; height: 100px; background-color: var(--color-peligro); margin: 0 auto; transform-origin: bottom center; transition: transform 0.1s; border-radius: 5px; }
        .centro-afinador { width: 20px; height: 20px; background-color: var(--color-acorde); border-radius: 50%; margin: -10px auto 0 auto; z-index: 2; position: relative;}
        .nota-afinador { text-align: center; font-size: 60px; font-weight: bold; margin: 20px 0; color: var(--color-primario);}
        
        #modal-qr { display: none; align-items: center; justify-content: center; background-color: rgba(0,0,0,0.9); z-index: 3000; }
        #contenedor-codigo-qr img { margin: 0 auto; border: 10px solid white; border-radius: 5px;}
        
        @media print {
            body { background-color: white !important; }
            body * { visibility: hidden; } 
            #visor-canciones, #visor-canciones * { visibility: visible; }
            #visor-canciones { position: absolute; left: 0; top: 0; width: 100%; padding: 0 !important; margin: 0 !important; background-color: white !important; color: black !important; display: block !important; }
            .visor-acordes { color: black !important; text-shadow: none !important; font-weight: bold !important; font-size: 16pt !important;}
            .visor-letra { color: black !important; font-size: 14pt !important;}
            .visor-tipo { color: #555 !important; font-size: 10pt !important; font-weight: bold;}
            .visor-header { border-bottom: 2px solid black !important; margin-bottom: 20px !important; text-align: left !important;}
            #visor-titulo { color: black !important; font-size: 26pt !important; margin-bottom: 0 !important; }
            #visor-info-extra { color: #333 !important; font-size: 14pt !important; font-weight: bold;}
            .barra-herramientas, .no-imprimir, #indicador-numero { display: none !important; }
        }
    </style>
</head>
<body>

    <datalist id="lista-nombres"></datalist>

    <header id="cabecera-app" class="no-imprimir">
        <div style="display: flex; align-items: center;">
            <button id="btn-hamburguesa" onclick="abrirMenu()">☰</button>
            <button class="btn-casita" onclick="cambiarPestana('inicio')">🏠</button>
            <span id="titulo-cabecera">Acordes Pro</span>
        </div>
    </header>

    <div id="menu-lateral" class="no-imprimir">
        <button class="btn-cerrar-menu" onclick="cerrarMenu()">❌ Cerrar</button>
        <button class="nav-btn" data-target="inicio" onclick="cambiarPestana('inicio')">🎸 Canciones</button>
        <button class="nav-btn" data-target="agregar" onclick="cambiarPestana('agregar')">➕ Agregar</button>
        <button class="nav-btn" data-target="setlist" onclick="cambiarPestana('setlist')">📋 Armar Lista</button>
        <button class="nav-btn" data-target="afinador" onclick="cambiarPestana('afinador')">🎵 Afinador</button>
    </div>

    <div class="contenedor">

        <div id="sec-inicio" class="seccion">
            <input type="text" id="buscador-inicio" placeholder="🔍 Buscar cancion o artista..." onkeyup="filtrarDashboard()">
            <div class="contenedor-etiquetas" id="filtros-dashboard">
                <span style="font-size: 14px; margin-top: 3px;">Filtros: </span>
                <div class="etiqueta" onclick="filtrarPorEtiqueta(this, 'Alabanza')">Alabanza</div>
                <div class="etiqueta" onclick="filtrarPorEtiqueta(this, 'Adoracion')">Adoracion</div>
                <div class="etiqueta" onclick="filtrarPorEtiqueta(this, 'Corito')">Corito</div>
                <div class="etiqueta" onclick="filtrarPorEtiqueta(this, 'Rapida')">Rapida</div>
                <div class="etiqueta" onclick="filtrarPorEtiqueta(this, 'Lenta')">Lenta</div>
                <div class="etiqueta" onclick="filtrarPorEtiqueta(this, 'Todas')">Quitar Filtros</div>
            </div>
            <div id="lista-canciones-dashboard"></div>
        </div>

        <div id="sec-agregar" class="seccion">
            <h2 id="titulo-seccion-agregar">Crear Cancion</h2>
            <label>Titulo</label>
            <input type="text" id="titulo-cancion">
            <label>Artista (Opcional)</label>
            <input type="text" id="artista-cancion">
            <label>Velocidad Metronomo (BPM)</label>
            <input type="number" id="bpm-cancion">
            <label>Etiquetas</label>
            <div class="contenedor-etiquetas" id="selector-etiquetas">
                <div class="etiqueta" onclick="toggleEtiqueta(this)">Alabanza</div>
                <div class="etiqueta" onclick="toggleEtiqueta(this)">Adoracion</div>
                <div class="etiqueta" onclick="toggleEtiqueta(this)">Corito</div>
                <div class="etiqueta" onclick="toggleEtiqueta(this)">Rapida</div>
                <div class="etiqueta" onclick="toggleEtiqueta(this)">Lenta</div>
            </div>
            <label>Tono Original</label>
            <select id="tono-cancion">
                <option value="">Adivinar (IA)</option>
                <option value="C">C</option><option value="C#">C#</option><option value="D">D</option><option value="D#">D#</option><option value="E">E</option><option value="F">F</option><option value="F#">F#</option><option value="G">G</option><option value="G#">G#</option><option value="A">A</option><option value="A#">A#</option><option value="B">B</option>
            </select>
            <div id="partes-cancion"></div>
            <button onclick="agregarParteFormulario()">+ Agregar parte</button>
            <button class="btn-guardar" onclick="guardarCancion()">💾 Guardar</button>
            <button class="btn-peligro" onclick="cancelarEdicion()" id="btn-cancelar-edicion" style="display: none;">❌ Cancelar</button>
        </div>

        <div id="sec-setlist" class="seccion">
            <h2>Armar Lista</h2>
            <div id="espacios-setlist"></div>
            <button onclick="agregarFilaSetlist()">+ Agregar a la lista</button>
            <button class="btn-accion" onclick="iniciarModoPresentacion()">▶️ Iniciar</button>
        </div>

        <div id="sec-afinador" class="seccion" style="text-align: center;">
            <h2>Afinador</h2>
            <button class="btn-accion" onclick="iniciarAfinador()">Encender Afinador</button>
            <div id="zona-afinador" style="display: none; margin-top: 40px;">
                <div style="width: 200px; height: 100px; border-bottom: 2px solid var(--borde); margin: 0 auto; position: relative; overflow: hidden;">
                    <div class="aguja-afinador" id="aguja"></div>
                </div>
                <div class="centro-afinador"></div>
                <div class="nota-afinador" id="nota-detectada">--</div>
            </div>
        </div>

    </div>

    <div id="modal-qr" class="seccion fullscreen" style="display: none;">
        <div style="background-color: white; border-radius: 15px; padding: 20px; text-align: center; color: black; max-width: 300px; margin: auto;">
            <h2>Compartir</h2>
            <div id="contenedor-codigo-qr"></div>
            <button class="btn-peligro" onclick="cerrarModalQR()">Volver</button>
        </div>
    </div>

    <div id="visor-canciones" class="seccion fullscreen" style="display: none;">
        <div class="visor-header">
            <h1 id="visor-titulo">Titulo</h1>
            <p id="visor-info-extra"></p>
        </div>
        <div id="visor-contenido"></div>
        
        <div class="barra-herramientas">
            <div style="display: flex; width: 100%; justify-content: space-between; border-bottom: 1px solid var(--borde); padding-bottom: 5px;">
                <div class="herramienta-grupo">
                    <button class="btn-chico" onclick="cancionAnterior()">⬅️</button>
                    <button class="btn-chico" onclick="cancionSiguiente()">➡️</button>
                </div>
                <div class="herramienta-grupo">
                    <button class="btn-chico" onclick="ajustarZoom(-0.1)">A-</button>
                    <button class="btn-chico" onclick="ajustarZoom(0.1)">A+</button>
                    <button class="btn-chico btn-accion" onclick="abrirModalQR()">QR</button>
                    <button class="btn-chico btn-peligro" onclick="cerrarVisor()">⏹️</button>
                </div>
            </div>
            <div style="display: flex; width: 100%; justify-content: space-between;">
                <div class="herramienta-grupo">
                    <button class="btn-chico" id="btn-metronomo" onclick="toggleMetronomo()">⏱️ Play</button>
                    <span id="visor-bpm-actual">--</span>
                </div>
                <div class="herramienta-grupo">
                    <button class="btn-chico" onclick="transponer(-1)">-</button>
                    <strong id="visor-tono-actual">C</strong>
                    <button class="btn-chico" onclick="transponer(1)">+</button>
                </div>
                <div class="herramienta-grupo">
                    <button class="btn-chico" onclick="toggleAutoScroll()">▶️</button>
                    <input type="range" id="velocidad-scroll" min="1" max="10" value="3" style="width: 40px;">
                </div>
            </div>
        </div>
    </div>

    <script>
        var bdCanciones = [];
        var listaReproduccion = [];
        var indiceRep = 0;
        var idEditando = -1;
        var pantallaActiva = null; 
        
        // Variable central para el nuevo sistema de zoom
        var factorZoom = 1;
        
        const notasOrden = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        var tonoOriginalIndex = 0;
        var tonoActualIndex = 0;
        var scrollInterval = null;
        var scrolleando = false;
        var audioCtxMetronomo = null;
        var idIntervalMetronomo = null;
        var metronomoActivo = false;

        function chequearImportacionQR() {
            var urlParams = new URLSearchParams(window.location.search);
            var importData = urlParams.get('importar');
            if (importData) {
                try {
                    var jsonStr = decodeURIComponent(escape(atob(importData)));
                    var cancionImportada = JSON.parse(jsonStr);
                    if (confirm("Compartieron: '" + cancionImportada.titulo + "'. ¿Guardar?")) {
                        bdCanciones.push(cancionImportada); guardarLocal(); alert("¡Guardada!");
                    }
                } catch(e) { alert("Error al leer QR."); }
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        window.onload = function() {
            var guardado = localStorage.getItem("AcordesAppPro");
            if (guardado) bdCanciones = JSON.parse(guardado);
            actualizarDatalist();
            chequearImportacionQR(); 
            cambiarPestana('inicio'); 
        };

        function abrirMenu() { document.getElementById('menu-lateral').classList.add('abierto'); }
        function cerrarMenu() { document.getElementById('menu-lateral').classList.remove('abierto'); }

        function cambiarPestana(id) {
            document.querySelectorAll(".nav-btn").forEach(b => {
                if(b.getAttribute("data-target") === id) b.classList.add("activa");
                else b.classList.remove("activa");
            });
            document.querySelectorAll(".seccion").forEach(s => { if(!s.classList.contains("fullscreen")) s.classList.remove("activa"); });
            document.getElementById("sec-" + id).classList.add("activa");
            cerrarMenu();
            if(id === 'inicio') dibujarDashboard();
        }

        // FUNCION DE ZOOM MEJORADA (Usa variables de CSS para que sea fluido en cualquier pantalla)
        function ajustarZoom(delta) {
            factorZoom += delta;
            // Ponemos limites para que la letra no desaparezca ni sea infinitamente grande
            if(factorZoom < 0.5) factorZoom = 0.5;
            if(factorZoom > 3.0) factorZoom = 3.0;
            document.documentElement.style.setProperty('--factor-zoom', factorZoom);
        }

        function dibujarDashboard(filtroTag = null) {
            var cont = document.getElementById("lista-canciones-dashboard");
            cont.innerHTML = "";
            var busqueda = document.getElementById("buscador-inicio").value.toLowerCase();
            var filtradas = bdCanciones.map((c, index) => ({...c, idReal: index})).filter(c => {
                var t = c.titulo.toLowerCase().includes(busqueda) || (c.artista && c.artista.toLowerCase().includes(busqueda));
                var g = filtroTag == null || filtroTag === 'Todas' ? true : (c.etiquetas && c.etiquetas.includes(filtroTag));
                return t && g;
            });
            filtradas.forEach(c => {
                var div = document.createElement("div");
                div.className = "tarjeta-cancion";
                div.innerHTML = `<h3>${c.titulo}</h3><p>👤 ${c.artista || 'Descon'} | 🎵 ${c.tono || '?'} | ⏱️ ${c.bpm || '--'}</p><div class="botones-lista"><button class="btn-chico btn-accion" onclick="verCancionIndividual(${c.idReal})">Ver / Tocar</button><button class="btn-chico btn-alerta" onclick="cargarParaEditar(${c.idReal})" style="background-color: var(--color-alerta); color: black;">Editar</button><button class="btn-chico btn-peligro" onclick="borrarCancion(${c.idReal})">Borrar</button></div>`;
                cont.appendChild(div);
            });
        }

        function filtrarDashboard() { dibujarDashboard(); }
        function filtrarPorEtiqueta(elem, tag) {
            document.querySelectorAll("#filtros-dashboard .etiqueta").forEach(e => e.classList.remove("seleccionada"));
            elem.classList.add("seleccionada");
            dibujarDashboard(tag);
        }

        function borrarCancion(id) { if(confirm("¿Eliminar?")) { bdCanciones.splice(id, 1); guardarLocal(); dibujarDashboard(); } }
        function guardarLocal() { localStorage.setItem("AcordesAppPro", JSON.stringify(bdCanciones)); actualizarDatalist(); }
        function actualizarDatalist() { var dl = document.getElementById("lista-nombres"); dl.innerHTML = ""; bdCanciones.forEach(c => dl.innerHTML += `<option value="${c.titulo}">`); }
        function toggleEtiqueta(elem) { elem.classList.toggle("seleccionada"); }

        function agregarParteFormulario(tipo='', acordes='', letra='') {
            var div = document.createElement("div"); div.className = "caja-parte";
            div.innerHTML = `<div class="cabecera-parte"><select class="input-tipo" style="width: 40%;"><option ${tipo=='Estrofa'?'selected':''}>Estrofa</option><option ${tipo=='Estribillo'?'selected':''}>Estribillo</option><option ${tipo=='Intro'?'selected':''}>Intro</option></select><div style="display: flex; gap: 5px;"><button class="btn-mover" onclick="moverParteFormulario(this, -1)">⬆️</button><button class="btn-mover" onclick="moverParteFormulario(this, 1)">⬇️</button><button class="btn-mover" onclick="this.parentElement.parentElement.parentElement.remove()">❌</button></div></div><input type="text" class="input-acordes" value="${acordes}"><textarea class="input-letra">${letra}</textarea>`;
            document.getElementById("partes-cancion").appendChild(div);
        }

        function moverParteFormulario(boton, direccion) {
            var caja = boton.closest('.caja-parte'); var cont = caja.parentElement;
            if (direccion === -1 && caja.previousElementSibling) cont.insertBefore(caja, caja.previousElementSibling);
            else if (direccion === 1 && caja.nextElementSibling) cont.insertBefore(caja.nextElementSibling, caja);
        }

        function cargarParaEditar(id) {
            idEditando = id; var c = bdCanciones[id];
            document.getElementById("titulo-cancion").value = c.titulo;
            document.getElementById("artista-cancion").value = c.artista || "";
            document.getElementById("bpm-cancion").value = c.bpm || "";
            document.getElementById("partes-cancion").innerHTML = "";
            c.partes.forEach(p => agregarParteFormulario(p.tipo, p.acordes, p.letra));
            document.getElementById("btn-cancelar-edicion").style.display = "block";
            cambiarPestana('agregar');
        }

        function cancelarEdicion() {
            idEditando = -1; document.getElementById("partes-cancion").innerHTML = "";
            document.getElementById("btn-cancelar-edicion").style.display = "none";
            cambiarPestana('inicio');
        }

        function guardarCancion() {
            var titulo = document.getElementById("titulo-cancion").value.trim();
            if (!titulo) return alert("Ponle titulo");
            var partes = [];
            document.querySelectorAll(".caja-parte").forEach(c => {
                var ac = c.querySelector(".input-acordes").value.replace(/-/g, ' ').replace(/\s+/g, ' ').trim().split(' ').map(n => n.charAt(0).toUpperCase() + n.substring(1)).join(' - ');
                var le = c.querySelector(".input-letra").value;
                if(ac || le.trim()) partes.push({ tipo: c.querySelector(".input-tipo").value, acordes: ac, letra: le });
            });
            var etiquetas = []; document.querySelectorAll("#selector-etiquetas .etiqueta.seleccionada").forEach(e => etiquetas.push(e.innerText));
            var nueva = { titulo, artista: document.getElementById("artista-cancion").value.trim(), bpm: document.getElementById("bpm-cancion").value, tono: "C", etiquetas, partes };
            if(idEditando === -1) bdCanciones.push(nueva); else bdCanciones[idEditando] = nueva;
            guardarLocal(); cancelarEdicion();
        }

        function agregarFilaSetlist() {
            var div = document.createElement("div"); div.className = "fila-armar";
            div.innerHTML = `<div class="controles-mover-setlist"><button class="btn-mover-setlist" onclick="moverFilaSetlist(this, -1)">⬆️</button><button class="btn-mover-setlist" onclick="moverFilaSetlist(this, 1)">⬇️</button></div><input type="text" list="lista-nombres" class="input-setlist"><button class="btn-peligro btn-chico" onclick="this.parentElement.remove()">❌</button>`;
            document.getElementById("espacios-setlist").appendChild(div);
        }

        function moverFilaSetlist(boton, direccion) {
            var f = boton.closest('.fila-armar'); var c = f.parentElement;
            if (direccion === -1 && f.previousElementSibling) c.insertBefore(f, f.previousElementSibling);
            else if (direccion === 1 && f.nextElementSibling) c.insertBefore(f.nextElementSibling, f);
        }

        async function activarPantalla() { if ('wakeLock' in navigator) { try { pantallaActiva = await navigator.wakeLock.request('screen'); } catch (err) {} } }
        function liberarPantalla() { if (pantallaActiva !== null) { pantallaActiva.release().then(() => { pantallaActiva = null; }); } }

        function verCancionIndividual(id) { listaReproduccion = [bdCanciones[id]]; indiceRep = 0; abrirVisor(); }
        function iniciarModoPresentacion() {
            listaReproduccion = []; document.querySelectorAll(".input-setlist").forEach(inp => { var c = bdCanciones.find(x => x.titulo === inp.value.trim()); if(c) listaReproduccion.push(c); });
            if(listaReproduccion.length === 0) return alert("Vacio"); indiceRep = 0; abrirVisor();
        }

        function abrirVisor() { activarPantalla(); document.getElementById("cabecera-app").style.display = "none"; document.getElementById("visor-canciones").style.display = "flex"; dibujarVisorActual(); }
        function cerrarVisor() { liberarPantalla(); detenerAutoScroll(); detenerMetronomo(); document.getElementById("visor-canciones").style.display = "none"; document.getElementById("cabecera-app").style.display = "flex"; }

        function dibujarVisorActual() {
            var c = listaReproduccion[indiceRep]; document.getElementById("visor-titulo").innerText = c.titulo;
            document.getElementById("visor-info-extra").innerText = `👤 ${c.artista||'Descon'} | ⏱️ ${c.bpm||'--'}`;
            document.getElementById("visor-bpm-actual").innerText = c.bpm || '--';
            tonoActualIndex = notasOrden.indexOf(c.tono) !== -1 ? notasOrden.indexOf(c.tono) : 0;
            document.getElementById("visor-tono-actual").innerText = notasOrden[tonoActualIndex];
            
            var html = "";
            c.partes.forEach(p => { 
                html += `<div class="visor-bloque"><div class="visor-tipo">${p.tipo}</div>`;
                if (p.acordes) html += `<div class="visor-acordes" data-original="${p.acordes}">${p.acordes}</div>`;
                if (p.letra) html += `<div class="visor-letra">${p.letra}</div>`;
                html += `</div>`;
            });
            document.getElementById("visor-contenido").innerHTML = html;
        }

        function cancionAnterior() { if(indiceRep > 0) { indiceRep--; dibujarVisorActual(); } }
        function cancionSiguiente() { if(indiceRep < listaReproduccion.length - 1) { indiceRep++; dibujarVisorActual(); } }

        function transponer(direccion) {
            tonoActualIndex = (tonoActualIndex + direccion + 12) % 12; document.getElementById("visor-tono-actual").innerText = notasOrden[tonoActualIndex];
            document.querySelectorAll(".visor-acordes").forEach(div => {
                div.innerText = div.getAttribute("data-original").replace(/[CDEFGAB]#?/g, match => notasOrden[(notasOrden.indexOf(match) + (tonoActualIndex - notasOrden.indexOf(listaReproduccion[indiceRep].tono) + 12) % 12) % 12]);
            });
        }

        function toggleMetronomo() {
            var bpm = parseInt(document.getElementById("visor-bpm-actual").innerText); if (isNaN(bpm)) return;
            if (metronomoActivo) { clearInterval(idIntervalMetronomo); metronomoActivo = false; }
            else {
                metronomoActivo = true; if (!audioCtxMetronomo) audioCtxMetronomo = new (window.AudioContext || window.webkitAudioContext)();
                idIntervalMetronomo = setInterval(() => {
                    var o = audioCtxMetronomo.createOscillator(); var g = audioCtxMetronomo.createGain(); o.connect(g); g.connect(audioCtxMetronomo.destination);
                    o.frequency.value = 800; g.gain.exponentialRampToValueAtTime(0.001, audioCtxMetronomo.currentTime + 0.05); o.start(); o.stop(audioCtxMetronomo.currentTime + 0.05);
                }, 60000 / bpm);
            }
        }

        function abrirModalQR() {
            var c = JSON.stringify(listaReproduccion[indiceRep]);
            document.getElementById("contenedor-codigo-qr").innerHTML = "";
            new QRCode(document.getElementById("contenedor-codigo-qr"), { text: window.location.origin + window.location.pathname + "?importar=" + btoa(unescape(encodeURIComponent(c))), width: 220, height: 220 });
            document.getElementById("modal-qr").style.display = "flex";
        }
        function cerrarModalQR() { document.getElementById("modal-qr").style.display = "none"; }
        
        function toggleAutoScroll() {
            var btn = document.getElementById("btn-scroll");
            var visor = document.getElementById("visor-canciones");
            
            if(scrolleando) {
                detenerAutoScroll();
            } else {
                scrolleando = true;
                btn.innerText = "⏸️";
                var velocidadStr = document.getElementById("velocidad-scroll").value;
                var tiempo = 110 - (parseInt(velocidadStr) * 10); 
                
                scrollInterval = setInterval(() => {
                    visor.scrollBy(0, 1);
                    if (visor.scrollTop + visor.clientHeight >= visor.scrollHeight - 5) detenerAutoScroll();
                }, tiempo);
            }
        }
        function detenerAutoScroll() { clearInterval(scrollInterval); scrolleando = false; document.getElementById("btn-scroll").innerText = "▶️"; }
        document.getElementById("velocidad-scroll").onchange = function() { if(scrolleando) { detenerAutoScroll(); toggleAutoScroll(); } };
    </script>
</body>
</html>
