<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acordes Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    
    <style>
        :root {
            --fondo-app: #121212;
            --fondo-tarjeta: #1e1e1e;
            --fondo-input: #2d2d2d;
            --texto-principal: #ffffff;
            --texto-secundario: #a0a0a0;
            --color-acorde: #00e676;
            --color-primario: #2979ff;
            --color-peligro: #ff5252;
            --color-alerta: #ffb300;
            --borde: #333333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--fondo-app);
            color: var(--texto-principal);
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
        }

        /* Cabecera principal */
        #cabecera-app {
            background-color: var(--fondo-tarjeta);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--borde);
            position: sticky;
            top: 0;
            z-index: 90;
        }

        #btn-hamburguesa {
            background: none;
            border: none;
            color: var(--texto-principal);
            font-size: 28px;
            padding: 0 15px 0 0;
            margin: 0;
            width: auto;
            cursor: pointer;
        }

        .btn-casita {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            margin-right: 15px;
            padding: 0;
            width: auto;
        }

        #titulo-cabecera {
            font-size: 20px;
            font-weight: bold;
            color: var(--texto-principal);
        }

        /* Menu lateral pantalla completa */
        #menu-lateral {
            position: fixed;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background-color: var(--fondo-app);
            z-index: 2000;
            transition: left 0.3s ease;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #menu-lateral.abierto {
            left: 0;
        }

        #menu-lateral .nav-btn {
            font-size: 20px;
            padding: 20px;
            margin-bottom: 15px;
            width: 90%;
            background-color: var(--fondo-tarjeta);
            border: 1px solid var(--borde);
            border-radius: 10px;
            color: var(--texto-principal);
            text-align: center;
        }

        #menu-lateral .nav-btn.activa {
            background-color: var(--color-primario);
            color: white;
            border-color: var(--color-primario);
        }

        .btn-cerrar-menu {
            width: auto;
            align-self: flex-end;
            background: none;
            color: var(--color-peligro);
            font-size: 18px;
            padding: 10px;
            margin-bottom: 30px;
        }

        .contenedor { max-width: 700px; margin: 15px auto; padding: 0 15px; }
        .seccion { display: none; animation: fadeIn 0.3s ease; }
        .seccion.activa { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2, h3 { color: var(--texto-principal); margin-top: 0; }
        
        button {
            border: none; border-radius: 8px; padding: 12px; font-size: 16px;
            font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px;
            background-color: var(--fondo-input); color: var(--texto-principal);
        }
        .btn-accion { background-color: var(--color-primario); color: white; }
        .btn-guardar { background-color: var(--color-acorde); color: #000; }
        .btn-peligro { background-color: transparent; border: 1px solid var(--color-peligro); color: var(--color-peligro); }
        .btn-chico { width: auto; padding: 6px 10px; font-size: 13px; margin: 2px; }
        .btn-mover { background-color: var(--fondo-app); padding: 10px; font-size: 18px; width: auto; margin: 0;}
        .btn-mover-setlist { background: none; border: none; font-size: 20px; padding: 0; margin: 0 5px; cursor: pointer;}

        input, select, textarea {
            width: 100%; padding: 12px; border: 1px solid var(--borde); border-radius: 8px;
            font-size: 16px; box-sizing: border-box; background-color: var(--fondo-input);
            color: var(--texto-principal); margin-bottom: 15px;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--color-primario); }

        .contenedor-etiquetas { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
        .etiqueta {
            background-color: var(--fondo-input); padding: 5px 10px; border-radius: 15px;
            font-size: 12px; border: 1px solid var(--borde); cursor: pointer;
        }
        .etiqueta.seleccionada { background-color: var(--color-primario); color: white; border-color: var(--color-primario); }
        .etiqueta-mostrar { background-color: var(--borde); color: var(--texto-secundario); padding: 3px 8px; border-radius: 10px; font-size: 10px; margin-right: 5px;}

        .tarjeta-cancion {
            background-color: var(--fondo-tarjeta); border: 1px solid var(--borde);
            padding: 15px; border-radius: 10px; margin-bottom: 10px;
        }
        .tarjeta-cancion h3 { margin: 0 0 5px 0; }
        .botones-lista { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        
        .caja-parte { background-color: var(--fondo-tarjeta); padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--color-primario); transition: transform 0.2s;}
        .cabecera-parte { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .fila-armar { display: flex; gap: 5px; align-items: center; margin-bottom: 10px; background-color: var(--fondo-tarjeta); padding: 5px; border-radius: 8px;}
        .fila-armar input { margin-bottom: 0; flex-grow: 1; }
        .controles-mover-setlist { display: flex; flex-direction: column; }

        .fullscreen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--fondo-app); z-index: 1000; padding: 20px;
            overflow-y: auto; display: flex; flex-direction: column;
        }
        .visor-header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--borde); padding-bottom: 10px; }
        .visor-header h1 { color: var(--color-primario); font-size: 28px; margin-bottom: 5px; }
        .visor-bloque { margin-bottom: 25px; }
        .visor-tipo { font-size: 12px; color: var(--texto-secundario); text-transform: uppercase; margin-bottom: 5px; }
        .visor-acordes { font-family: monospace; font-size: 22px; color: var(--color-acorde); font-weight: bold; margin-bottom: 5px; }
        .visor-letra { font-size: 18px; line-height: 1.5; white-space: pre-wrap; }
        
        .barra-herramientas {
            position: fixed; bottom: 0; left: 0; right: 0; background-color: var(--fondo-tarjeta);
            padding: 10px; display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid var(--borde); z-index: 1010; flex-wrap: wrap; gap: 5px;
        }
        .herramienta-grupo { display: flex; gap: 5px; align-items: center; }

        .aguja-afinador {
            width: 10px; height: 100px; background-color: var(--color-peligro); margin: 0 auto;
            transform-origin: bottom center; transition: transform 0.1s; border-radius: 5px;
        }
        .centro-afinador { width: 20px; height: 20px; background-color: var(--color-acorde); border-radius: 50%; margin: -10px auto 0 auto; z-index: 2; position: relative;}
        .nota-afinador { text-align: center; font-size: 60px; font-weight: bold; margin: 20px 0; color: var(--color-primario);}
        
        /* IMPRESION LIMPIA */
        @media print {
            body { background-color: white !important; }
            body * { visibility: hidden; } 
            
            #visor-canciones, #visor-canciones * { visibility: visible; }
            
            #visor-canciones {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                padding: 0 !important;
                margin: 0 !important;
                background-color: white !important;
                color: black !important;
                display: block !important;
            }

            .visor-acordes { color: black !important; text-shadow: none !important; font-weight: bold !important; font-size: 16pt !important;}
            .visor-letra { color: black !important; font-size: 14pt !important;}
            .visor-tipo { color: #555 !important; font-size: 10pt !important; font-weight: bold;}
            
            .visor-header { border-bottom: 2px solid black !important; margin-bottom: 20px !important; text-align: left !important;}
            #visor-titulo { color: black !important; font-size: 26pt !important; margin-bottom: 0 !important; }
            #visor-info-extra { color: #333 !important; font-size: 14pt !important; font-weight: bold;}
            
            .barra-herramientas, .no-imprimir, #indicador-numero { display: none !important; }
        }
    </style>
</head>
<body>

    <datalist id="lista-nombres"></datalist>

    <header id="cabecera-app" class="no-imprimir">
        <div style="display: flex; align-items: center;">
            <button id="btn-hamburguesa" onclick="abrirMenu()">☰</button>
            <button class="btn-casita" onclick="cambiarPestana('inicio')">🏠</button>
            <span id="titulo-cabecera">Acordes Pro</span>
        </div>
    </header>

    <div id="menu-lateral" class="no-imprimir">
        <button class="btn-cerrar-menu" onclick="cerrarMenu()">❌ Cerrar</button>
        <button class="nav-btn" data-target="inicio" onclick="cambiarPestana('inicio')">🎸 Canciones</button>
        <button class="nav-btn" data-target="agregar" onclick="cambiarPestana('agregar')">➕ Agregar</button>
        <button class="nav-btn" data-target="setlist" onclick="cambiarPestana('setlist')">📋 Armar Lista</button>
        <button class="nav-btn" data-target="afinador" onclick="cambiarPestana('afinador')">🎵 Afinador</button>
    </div>

    <div class="contenedor">

        <div id="sec-inicio" class="seccion">
            <input type="text" id="buscador-inicio" placeholder="🔍 Buscar cancion o artista..." onkeyup="filtrarDashboard()">
            
            <div class="contenedor-etiquetas" id="filtros-dashboard">
                <span style="font-size: 14px; margin-top: 3px;">Filtros: </span>
                <div class="etiqueta" onclick="filtrarPorEtiqueta(this, 'Alabanza')">Alabanza</div>
                <div class="etiqueta" onclick="filtrarPorEtiqueta(this, 'Adoracion')">Adoracion</div>
                <div class="etiqueta" onclick="filtrarPorEtiqueta(this, 'Corito')">Corito</div>
                <div class="etiqueta" onclick="filtrarPorEtiqueta(this, 'Rapida')">Rapida</div>
                <div class="etiqueta" onclick="filtrarPorEtiqueta(this, 'Lenta')">Lenta</div>
                <div class="etiqueta" onclick="filtrarPorEtiqueta(this, 'Todas')">Quitar Filtros</div>
            </div>

            <div id="lista-canciones-dashboard"></div>
        </div>

        <div id="sec-agregar" class="seccion">
            <h2 id="titulo-seccion-agregar">Crear Cancion</h2>
            
            <label>Titulo</label>
            <input type="text" id="titulo-cancion">
            
            <label>Artista (Opcional)</label>
            <input type="text" id="artista-cancion">
            
            <label>Etiquetas (Selecciona varias)</label>
            <div class="contenedor-etiquetas" id="selector-etiquetas">
                <div class="etiqueta" onclick="toggleEtiqueta(this)">Alabanza</div>
                <div class="etiqueta" onclick="toggleEtiqueta(this)">Adoracion</div>
                <div class="etiqueta" onclick="toggleEtiqueta(this)">Corito</div>
                <div class="etiqueta" onclick="toggleEtiqueta(this)">Rapida</div>
                <div class="etiqueta" onclick="toggleEtiqueta(this)">Lenta</div>
            </div>

            <label>Tono Original</label>
            <select id="tono-cancion">
                <option value="">Adivinar (IA)</option>
                <option value="C">C (Do)</option>
                <option value="C#">C# / Db</option>
                <option value="D">D (Re)</option>
                <option value="D#">D# / Eb</option>
                <option value="E">E (Mi)</option>
                <option value="F">F (Fa)</option>
                <option value="F#">F# / Gb</option>
                <option value="G">G (Sol)</option>
                <option value="G#">G# / Ab</option>
                <option value="A">A (La)</option>
                <option value="A#">A# / Bb</option>
                <option value="B">B (Si)</option>
            </select>
            
            <div id="partes-cancion"></div>
            
            <button onclick="agregarParteFormulario()">+ Agregar estrofa/estribillo</button>
            <button class="btn-guardar" onclick="guardarCancion()" style="margin-top: 20px;">💾 Guardar</button>
            <button class="btn-peligro" onclick="cancelarEdicion()" id="btn-cancelar-edicion" style="display: none;">❌ Cancelar Edicion</button>
        </div>

        <div id="sec-setlist" class="seccion">
            <h2>Armar Lista</h2>
            <div id="espacios-setlist"></div>
            <button onclick="agregarFilaSetlist()">+ Agregar cancion a la lista</button>
            <br><br>
            <button class="btn-accion" onclick="iniciarModoPresentacion()">▶️ Iniciar Presentacion</button>
        </div>

        <div id="sec-afinador" class="seccion" style="text-align: center;">
            <h2>Afinador de Guitarra</h2>
            <p>Permite el acceso al microfono para afinar.</p>
            <button class="btn-accion" id="btn-iniciar-afinador" onclick="iniciarAfinador()">Encender Afinador</button>
            
            <div id="zona-afinador" style="display: none; margin-top: 40px;">
                <div style="width: 200px; height: 100px; border-bottom: 2px solid var(--borde); margin: 0 auto; position: relative; overflow: hidden;">
                    <div class="aguja-afinador" id="aguja"></div>
                </div>
                <div class="centro-afinador"></div>
                <div class="nota-afinador" id="nota-detectada">--</div>
                <p id="indicacion-afinador">Toca una cuerda</p>
            </div>
        </div>

    </div>

    <div id="visor-canciones" class="seccion fullscreen" style="display: none;">
        <div class="visor-header">
            <h1 id="visor-titulo">Titulo</h1>
            <p id="indicador-numero" class="no-imprimir">Vista Previa</p>
            <p id="visor-info-extra"></p>
        </div>
        
        <div id="visor-contenido" style="flex-grow: 1; margin-bottom: 60px;"></div>
        
        <div class="barra-herramientas" id="controles-visor">
            <div class="herramienta-grupo">
                <button class="btn-chico" onclick="cancionAnterior()" id="btn-visor-ant">⬅️</button>
                <button class="btn-chico" onclick="cancionSiguiente()" id="btn-visor-sig">➡️</button>
                <button class="btn-chico btn-peligro" onclick="cerrarVisor()">⏹️</button>
            </div>
            
            <div class="herramienta-grupo">
                <span style="font-size: 12px;">Tono:</span>
                <button class="btn-chico" onclick="transponer(-1)">-</button>
                <strong id="visor-tono-actual" style="font-size: 14px; width: 25px; text-align: center;">C</strong>
                <button class="btn-chico" onclick="transponer(1)">+</button>
            </div>

            <div class="herramienta-grupo">
                <span style="font-size: 12px;">Scroll:</span>
                <button class="btn-chico" onclick="toggleAutoScroll()" id="btn-scroll">▶️</button>
                <input type="range" id="velocidad-scroll" min="1" max="10" value="3" style="width: 60px; margin: 0; padding: 0;">
            </div>
            
            <button class="btn-chico btn-accion" onclick="window.print()">🖨️</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(function() {
                console.log('PWA Lista para instalar');
            });
        }

        var bdCanciones = [];
        var listaReproduccion = [];
        var indiceRep = 0;
        var idEditando = -1;
        var pantallaActiva = null; 
        
        const notasOrden = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        var tonoOriginalIndex = 0;
        var tonoActualIndex = 0;

        var scrollInterval = null;
        var scrolleando = false;

        // ESTO ASEGURA QUE SIEMPRE ARRANQUE EN "CANCIONES" AL ABRIR
        window.onload = function() {
            var guardado = localStorage.getItem("AcordesAppPro");
            if (guardado) bdCanciones = JSON.parse(guardado);
            actualizarDatalist();
            cambiarPestana('inicio'); 
        };

        function abrirMenu() {
            document.getElementById('menu-lateral').classList.add('abierto');
        }

        function cerrarMenu() {
            document.getElementById('menu-lateral').classList.remove('abierto');
        }

        function cambiarPestana(id) {
            document.querySelectorAll(".nav-btn").forEach(b => {
                if(b.getAttribute("data-target") === id) {
                    b.classList.add("activa");
                } else {
                    b.classList.remove("activa");
                }
            });

            document.querySelectorAll(".seccion").forEach(s => {
                if(!s.classList.contains("fullscreen")) s.classList.remove("activa");
            });
            document.getElementById("sec-" + id).classList.add("activa");
            window.scrollTo(0, 0);

            cerrarMenu();

            if(id !== 'afinador') detenerAfinador();

            if(id === 'inicio') dibujarDashboard();
            if(id === 'setlist' && document.getElementById("espacios-setlist").innerHTML === "") agregarFilaSetlist();
        }

        function dibujarDashboard(filtroTag = null) {
            var cont = document.getElementById("lista-canciones-dashboard");
            cont.innerHTML = "";
            var busqueda = document.getElementById("buscador-inicio").value.toLowerCase();

            var filtradas = bdCanciones.map((c, index) => ({...c, idReal: index})).filter(c => {
                var coincideTexto = c.titulo.toLowerCase().includes(busqueda) || (c.artista && c.artista.toLowerCase().includes(busqueda));
                var coincideTag = filtroTag == null || filtroTag === 'Todas' ? true : (c.etiquetas && c.etiquetas.includes(filtroTag));
                return coincideTexto && coincideTag;
            });

            if (filtradas.length === 0) {
                cont.innerHTML = "<p style='text-align:center;'>No se encontraron canciones.</p>";
                return;
            }

            filtradas.forEach(c => {
                var tagsHTML = "";
                if(c.etiquetas) {
                    c.etiquetas.forEach(t => tagsHTML += `<span class="etiqueta-mostrar">${t}</span>`);
                }

                var div = document.createElement("div");
                div.className = "tarjeta-cancion";
                div.innerHTML = `
                    <h3>${c.titulo}</h3>
                    <p style="font-size: 12px; color: var(--texto-secundario); margin: 0 0 5px 0;">👤 ${c.artista || 'Desconocido'} | 🎵 ${c.tono || '?'}</p>
                    <div>${tagsHTML}</div>
                    <div class="botones-lista">
                        <button class="btn-chico btn-accion" onclick="verCancionIndividual(${c.idReal})">Ver</button>
                        <button class="btn-chico btn-alerta" onclick="cargarParaEditar(${c.idReal})" style="background-color: var(--color-alerta); color: black;">Editar</button>
                        <button class="btn-chico btn-peligro" onclick="borrarCancion(${c.idReal})">Borrar</button>
                    </div>
                `;
                cont.appendChild(div);
            });
        }

        function filtrarDashboard() { dibujarDashboard(); }
        
        function filtrarPorEtiqueta(elem, tag) {
            document.querySelectorAll("#filtros-dashboard .etiqueta").forEach(e => e.classList.remove("seleccionada"));
            elem.classList.add("seleccionada");
            dibujarDashboard(tag);
        }

        function borrarCancion(id) {
            if(confirm("¿Eliminar cancion?")) {
                bdCanciones.splice(id, 1);
                guardarLocal();
                dibujarDashboard();
            }
        }

        function guardarLocal() {
            localStorage.setItem("AcordesAppPro", JSON.stringify(bdCanciones));
            actualizarDatalist();
        }

        function actualizarDatalist() {
            var dl = document.getElementById("lista-nombres");
            dl.innerHTML = "";
            bdCanciones.forEach(c => dl.innerHTML += `<option value="${c.titulo}">`);
        }

        function toggleEtiqueta(elem) { elem.classList.toggle("seleccionada"); }

        function agregarParteFormulario(tipo='', acordes='', letra='') {
            var div = document.createElement("div");
            div.className = "caja-parte";
            div.innerHTML = `
                <div class="cabecera-parte">
                    <select class="input-tipo" style="margin-bottom: 0; width: 40%;">
                        <option ${tipo=='Estrofa'?'selected':''}>Estrofa</option>
                        <option ${tipo=='Estribillo'?'selected':''}>Estribillo</option>
                        <option ${tipo=='Intro'?'selected':''}>Intro</option>
                        <option ${tipo=='Solo'?'selected':''}>Solo</option>
                        <option ${tipo=='Puente'?'selected':''}>Puente</option>
                    </select>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn-mover" onclick="moverParteFormulario(this, -1)">⬆️</button>
                        <button class="btn-mover" onclick="moverParteFormulario(this, 1)">⬇️</button>
                        <button class="btn-mover" style="color: var(--color-peligro);" onclick="this.parentElement.parentElement.parentElement.remove()">❌</button>
                    </div>
                </div>
                <input type="text" class="input-acordes" placeholder="Acordes (ej: G D Em C)" value="${acordes}">
                <textarea class="input-letra" placeholder="Letra...">${letra}</textarea>
            `;
            document.getElementById("partes-cancion").appendChild(div);
        }

        function moverParteFormulario(boton, direccion) {
            var caja = boton.closest('.caja-parte');
            var contenedor = caja.parentElement;
            
            if (direccion === -1 && caja.previousElementSibling) {
                contenedor.insertBefore(caja, caja.previousElementSibling);
            } else if (direccion === 1 && caja.nextElementSibling) {
                contenedor.insertBefore(caja.nextElementSibling, caja);
            }
        }

        function cargarParaEditar(id) {
            idEditando = id;
            var c = bdCanciones[id];
            document.getElementById("titulo-cancion").value = c.titulo;
            document.getElementById("artista-cancion").value = c.artista || "";
            
            var selectTono = document.getElementById("tono-cancion");
            selectTono.value = ""; 
            if(c.tono && notasOrden.includes(c.tono)) selectTono.value = c.tono;

            document.querySelectorAll("#selector-etiquetas .etiqueta").forEach(e => {
                if(c.etiquetas && c.etiquetas.includes(e.innerText)) e.classList.add("seleccionada");
                else e.classList.remove("seleccionada");
            });

            document.getElementById("partes-cancion").innerHTML = "";
            c.partes.forEach(p => agregarParteFormulario(p.tipo, p.acordes, p.letra));

            document.getElementById("titulo-seccion-agregar").innerText = "Editando Cancion";
            document.getElementById("btn-cancelar-edicion").style.display = "block";
            cambiarPestana('agregar');
        }

        function cancelarEdicion() {
            idEditando = -1;
            document.getElementById("titulo-cancion").value = "";
            document.getElementById("artista-cancion").value = "";
            document.getElementById("tono-cancion").value = "";
            document.getElementById("partes-cancion").innerHTML = "";
            document.querySelectorAll("#selector-etiquetas .etiqueta").forEach(e => e.classList.remove("seleccionada"));
            document.getElementById("titulo-seccion-agregar").innerText = "Crear Cancion";
            document.getElementById("btn-cancelar-edicion").style.display = "none";
            cambiarPestana('inicio');
        }

        function adivinarTono(partes) {
            for (let p of partes) {
                if (p.acordes) {
                    let primero = p.acordes.split('-')[0].trim();
                    let limpio = primero.replace(/m|7|maj|sus|dim|aug/gi, '').trim();
                    if (notasOrden.includes(limpio)) return limpio;
                }
            }
            return "C";
        }

        function procesarAcordesFormato(texto) {
            let limpio = texto.replace(/-/g, ' ').replace(/\s+/g, ' ').trim();
            if(!limpio) return "";
            return limpio.split(' ').map(n => n.charAt(0).toUpperCase() + n.substring(1)).join(' - ');
        }

        function guardarCancion() {
            var titulo = document.getElementById("titulo-cancion").value.trim();
            if (!titulo) return alert("Falta el titulo");

            var partes = [];
            document.querySelectorAll(".caja-parte").forEach(c => {
                var ac = procesarAcordesFormato(c.querySelector(".input-acordes").value);
                var le = c.querySelector(".input-letra").value;
                if(ac || le.trim()) partes.push({ tipo: c.querySelector(".input-tipo").value, acordes: ac, letra: le });
            });

            var etiquetas = [];
            document.querySelectorAll("#selector-etiquetas .etiqueta.seleccionada").forEach(e => etiquetas.push(e.innerText));

            var tono = document.getElementById("tono-cancion").value;
            if(!tono) tono = adivinarTono(partes);

            var nueva = { titulo, artista: document.getElementById("artista-cancion").value.trim(), tono, etiquetas, partes };

            if(idEditando === -1) bdCanciones.push(nueva);
            else bdCanciones[idEditando] = nueva;

            guardarLocal();
            cancelarEdicion();
            alert("Guardado exitosamente");
        }

        function agregarFilaSetlist() {
            var div = document.createElement("div");
            div.className = "fila-armar";
            div.innerHTML = `
                <div class="controles-mover-setlist">
                    <button class="btn-mover-setlist" onclick="moverFilaSetlist(this, -1)">⬆️</button>
                    <button class="btn-mover-setlist" onclick="moverFilaSetlist(this, 1)">⬇️</button>
                </div>
                <input type="text" list="lista-nombres" class="input-setlist" placeholder="Buscar cancion...">
                <button class="btn-peligro btn-chico" style="padding: 12px;" onclick="this.parentElement.remove()">❌</button>
            `;
            document.getElementById("espacios-setlist").appendChild(div);
        }

        function moverFilaSetlist(boton, direccion) {
            var fila = boton.closest('.fila-armar');
            var contenedor = fila.parentElement;
            
            if (direccion === -1 && fila.previousElementSibling) {
                contenedor.insertBefore(fila, fila.previousElementSibling);
            } else if (direccion === 1 && fila.nextElementSibling) {
                contenedor.insertBefore(fila.nextElementSibling, fila);
            }
        }

        async function activarPantalla() {
            if ('wakeLock' in navigator) {
                try {
                    pantallaActiva = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.log('El Wake Lock no se pudo activar:', err);
                }
            }
        }

        function liberarPantalla() {
            if (pantallaActiva !== null) {
                pantallaActiva.release().then(() => {
                    pantallaActiva = null;
                });
            }
        }

        function verCancionIndividual(id) {
            listaReproduccion = [bdCanciones[id]];
            indiceRep = 0;
            document.getElementById("btn-visor-ant").style.display = "none";
            document.getElementById("btn-visor-sig").style.display = "none";
            abrirVisor();
        }

        function iniciarModoPresentacion() {
            listaReproduccion = [];
            document.querySelectorAll(".input-setlist").forEach(inp => {
                var c = bdCanciones.find(x => x.titulo === inp.value.trim());
                if(c) listaReproduccion.push(c);
            });
            if(listaReproduccion.length === 0) return alert("No hay canciones validas");
            
            indiceRep = 0;
            document.getElementById("btn-visor-ant").style.display = "inline-block";
            document.getElementById("btn-visor-sig").style.display = "inline-block";
            abrirVisor();
        }

        function abrirVisor() {
            activarPantalla(); 
            document.getElementById("cabecera-app").style.display = "none";
            document.getElementById("visor-canciones").style.display = "flex";
            dibujarVisorActual();
        }

        function cerrarVisor() {
            liberarPantalla(); 
            detenerAutoScroll();
            document.getElementById("visor-canciones").style.display = "none";
            document.getElementById("cabecera-app").style.display = "flex";
        }

        function dibujarVisorActual() {
            detenerAutoScroll();
            var c = listaReproduccion[indiceRep];
            document.getElementById("visor-titulo").innerText = c.titulo;
            document.getElementById("indicador-numero").innerText = listaReproduccion.length > 1 ? `CANCION ${indiceRep + 1} DE ${listaReproduccion.length}` : 'Vista Previa';
            document.getElementById("visor-info-extra").innerText = `👤 ${c.artista||'Desconocido'}`;
            
            tonoOriginalIndex = notasOrden.indexOf(c.tono);
            if(tonoOriginalIndex === -1) tonoOriginalIndex = 0;
            tonoActualIndex = tonoOriginalIndex;
            document.getElementById("visor-tono-actual").innerText = notasOrden[tonoActualIndex];

            var html = "";
            c.partes.forEach(p => {
                html += `<div class="visor-bloque"><div class="visor-tipo">${p.tipo}</div>`;
                if(p.acordes) html += `<div class="visor-acordes" data-original="${p.acordes}">${p.acordes}</div>`;
                if(p.letra) html += `<div class="visor-letra">${p.letra}</div>`;
                html += `</div>`;
            });
            document.getElementById("visor-contenido").innerHTML = html;
            document.getElementById("visor-canciones").scrollTop = 0;
        }

        function cancionAnterior() { if(indiceRep > 0) { indiceRep--; dibujarVisorActual(); } }
        function cancionSiguiente() {
            if(indiceRep < listaReproduccion.length - 1) { indiceRep++; dibujarVisorActual(); }
            else { alert("Fin de la lista"); cerrarVisor(); }
        }

        function transponer(direccion) {
            tonoActualIndex = (tonoActualIndex + direccion + 12) % 12;
            document.getElementById("visor-tono-actual").innerText = notasOrden[tonoActualIndex];
            
            var diff = (tonoActualIndex - tonoOriginalIndex + 12) % 12;

            document.querySelectorAll(".visor-acordes").forEach(div => {
                var original = div.getAttribute("data-original");
                var nuevo = original.replace(/[CDEFGAB]#?/g, match => {
                    var idx = notasOrden.indexOf(match);
                    if(idx === -1) return match;
                    return notasOrden[(idx + diff) % 12];
                });
                div.innerText = nuevo;
            });
        }

        function toggleAutoScroll() {
            var btn = document.getElementById("btn-scroll");
            var visor = document.getElementById("visor-canciones");
            
            if(scrolleando) {
                detenerAutoScroll();
            } else {
                scrolleando = true;
                btn.innerText = "⏸️";
                var velocidadStr = document.getElementById("velocidad-scroll").value;
                var tiempo = 110 - (parseInt(velocidadStr) * 10); 
                
                scrollInterval = setInterval(() => {
                    visor.scrollBy(0, 1);
                    if (visor.scrollTop + visor.clientHeight >= visor.scrollHeight - 5) detenerAutoScroll();
                }, tiempo);
            }
        }
        function detenerAutoScroll() {
            clearInterval(scrollInterval);
            scrolleando = false;
            document.getElementById("btn-scroll").innerText = "▶️";
        }
        document.getElementById("velocidad-scroll").onchange = function() {
            if(scrolleando) { detenerAutoScroll(); toggleAutoScroll(); }
        };

        var audioCtx;
        var analyser;
        var frameId;

        function iniciarAfinador() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({audio: true}).then(function(stream) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 2048;
                    var source = audioCtx.createMediaStreamSource(stream);
                    source.connect(analyser);
                    
                    document.getElementById("btn-iniciar-afinador").style.display = "none";
                    document.getElementById("zona-afinador").style.display = "block";
                    actualizarAfinador();
                }).catch(function(err) {
                    alert("Error al acceder al microfono: " + err);
                });
            } else {
                alert("Tu navegador no soporta grabacion de audio.");
            }
        }

        function detenerAfinador() {
            if(frameId) cancelAnimationFrame(frameId);
            if(audioCtx) audioCtx.close();
            document.getElementById("btn-iniciar-afinador").style.display = "block";
            document.getElementById("zona-afinador").style.display = "none";
        }

        const frecuenciasCuerdas = [
            { nota: "E (1ra)", freq: 329.63 },
            { nota: "B (2da)", freq: 246.94 },
            { nota: "G (3ra)", freq: 196.00 },
            { nota: "D (4ta)", freq: 146.83 },
            { nota: "A (5ta)", freq: 110.00 },
            { nota: "E (6ta)", freq: 82.41 }
        ];

        function actualizarAfinador() {
            var buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);
            var freq = autoCorrelacion(buffer, audioCtx.sampleRate);

            if (freq !== -1) {
                let cuerdaCercana = frecuenciasCuerdas[0];
                let minimaDif = Math.abs(freq - cuerdaCercana.freq);
                
                for(let i=1; i<frecuenciasCuerdas.length; i++) {
                    let dif = Math.abs(freq - frecuenciasCuerdas[i].freq);
                    if(dif < minimaDif) {
                        minimaDif = dif;
                        cuerdaCercana = frecuenciasCuerdas[i];
                    }
                }

                document.getElementById("nota-detectada").innerText = cuerdaCercana.nota;
                
                var cents = 1200 * Math.log2(freq / cuerdaCercana.freq);
                var rotacion = Math.max(-45, Math.min(45, (cents / 50) * 45)); 
                document.getElementById("aguja").style.transform = `rotate(${rotacion}deg)`;

                if(Math.abs(cents) < 5) {
                    document.getElementById("aguja").style.backgroundColor = "var(--color-acorde)";
                    document.getElementById("indicacion-afinador").innerText = "Afinada";
                } else if (cents < 0) {
                    document.getElementById("aguja").style.backgroundColor = "var(--color-alerta)";
                    document.getElementById("indicacion-afinador").innerText = "Sube la tension";
                } else {
                    document.getElementById("aguja").style.backgroundColor = "var(--color-peligro)";
                    document.getElementById("indicacion-afinador").innerText = "Baja la tension";
                }
            }
            frameId = requestAnimationFrame(actualizarAfinador);
        }

        function autoCorrelacion(buf, sampleRate) {
            var SIZE = buf.length;
            var rms = 0;
            for (var i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.01) return -1;

            var r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (var i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (var i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }
            
            buf = buf.slice(r1, r2);
            SIZE = buf.length;
            var c = new Array(SIZE).fill(0);
            for (var i = 0; i < SIZE; i++) for (var j = 0; j < SIZE - i; j++) c[i] = c[i] + buf[j] * buf[j + i];
            
            var d = 0; while (c[d] > c[d + 1]) d++;
            var maxval = -1, maxpos = -1;
            for (var i = d; i < SIZE; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }
            var T0 = maxpos;
            return sampleRate / T0;
        }
    </script>
